<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 2</title>
    <link
      rel="icon"
      href="https://thumbs.dreamstime.com/b/desenho-do-s%C3%ADmbolo-de-nata%C3%A7%C3%A3o-%C3%ADcone-colorido-conceito-pode-ser-usado-em-web-e-port%C3%A1teis-eps-175703626.jpg"
    />
  </head>

  <body>
    <h1>TABELA INCRÍVEL</h1>
    <!-- Criando tabela -->
    <table border="5">
        <!-- Cabeçalho da tabela -->
        <thead>
            <tr>
                <th>Nome</th>
                <th>Item</th>
                <th>Quantidade</th>
                <th>Preço</th>
            </tr>
        </thead>
            <!-- Corpo da tabela -->
            <tbody>
                <!-- Crio uma linha -->
                <tr>
                    <!-- Crio uma coluna -->
                    <td>Cristiano</td>
                    <td>Perfume</td>
                    <td>7</td>
                    <td>R$777,77</td>
                </tr>
                <tr>
                    <td>Maria</td>
                    <td>Tênis</td>
                    <td>3</td>
                    <td>R$1555,00</td>
                </tr>
                <tr>
                    <td>Laisa</td>
                    <td>Anel</td>
                    <td>5</td>
                    <td>R$8888,00</td>
                </tr>

                <tr>
                    <td>Neymar</td>
                    <td>Ilha em Santos</td>
                    <td>1</td>
                    <td>R$ 17 mil</td>
                </tr>
                <tr>
                    <td rowspan="2">Airam</td>
                    <td>Camisa do Flamengo</td>
                    <td>5</td>
                    <td>R$ 1500</td>
                </tr>
                <tr>
                    <td>Foni bluetuf</td>
                    <td>7</td>
                    <td>R$ 1700</td>
                </tr>
            </tbody>

            <!-- Rodapé da tabela -->
            <tfoot>
                <tr>
                    <!-- Colspan define o número de colunas que o td irá abranger -->
                    <td colspan="4"> Todos os direitos estão reservados &copy;</td>
                </tr>
            </tfoot>
    </table>
  </body>
</html>
